name: 🛡️ Hardware RTL Lint & Verification CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-rtl:
    name: 🔍 Verilator RTL Lint Check
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository Code
      uses: actions/checkout@v3

    - name: 🛠️ Install Verilator Compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y verilator make

    - name: 🔬 Lint Phase 4 RTL Wrapper
      run: |
        verilator --lint-only -Wall \
          -Iphases/phase4-high-speed-io/rtl/top \
          phases/phase4-high-speed-io/rtl/top/titan_x_top.v

    - name: 🔬 Lint Phase 5 RTL Wrapper
      run: |
        verilator --lint-only -Wall \
          -Iphases/phase5-acceleration/rtl/top \
          phases/phase5-acceleration/rtl/top/titan_x_top.v

  docs-build:
    name: 📚 Documentation Compile Check
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository Code
      uses: actions/checkout@v3

    - name: 🐍 Set up Python 3.x Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 🛠️ Install MkDocs Dependencies
      run: |
        pip install mkdocs-material mkdocs-git-revision-date-localized-plugin mkdocs-minify-plugin

    - name: 🏗️ Compile Static Documentation Site
      run: |
        mkdocs build --strict
