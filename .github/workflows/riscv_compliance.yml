name: RISC-V Compliance Tests

on:
  push:
    branches: [main]
    paths:
      - 'hardware/rtl/**'
      - 'hardware/chipyard/**'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'   # Weekly on Sunday at 2 AM
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  riscv-arch-tests:
    name: RISC-V Architecture Tests
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        isa: [rv64i, rv64m, rv64a, rv64f, rv64d, rv64c]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # Need riscv-tests submodule

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-riscv64-unknown-elf \
            binutils-riscv64-unknown-elf \
            qemu-system-misc \
            python3-pip
          pip3 install pytest

      - name: Initialize riscv-tests submodule
        run: |
          git submodule update --init verification/riscv-tests

      - name: Build ${{ matrix.isa }} tests
        run: |
          cd verification/riscv-tests
          autoconf
          ./configure --prefix="$PWD/install"
          make isa -j"$(nproc)"
        continue-on-error: true

      - name: Run ${{ matrix.isa }} tests in QEMU
        run: |
          echo "Running RISC-V ${{ matrix.isa }} tests..."
          PASS=0; FAIL=0
          for elf in verification/riscv-tests/isa/${{ matrix.isa }}-*; do
            if [ -f "$elf" ] && [ ! "${elf##*.}" = "dump" ]; then
              result=$(timeout 30 qemu-system-riscv64 \
                -machine virt \
                -cpu rv64 \
                -nographic \
                -bios none \
                -kernel "$elf" \
                -serial mon:stdio 2>&1 | head -5 || echo "FAIL")
              if echo "$result" | grep -q "PASS\|pass"; then
                ((PASS++)) || true
              else
                ((FAIL++)) || true
              fi
            fi
          done
          echo "PASS: $PASS  FAIL: $FAIL"
          # Store results
          echo "isa=${{ matrix.isa }},pass=$PASS,fail=$FAIL" >> compliance_results.txt
        continue-on-error: true

      - name: Upload compliance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compliance-${{ matrix.isa }}
          path: compliance_results.txt

  # ──────────────────────────────────────────────────────────────────────────
  compliance-summary:
    name: Compliance Summary
    needs: riscv-arch-tests
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all compliance results
        uses: actions/download-artifact@v4
        with:
          pattern: compliance-*
          merge-multiple: true

      - name: Generate compliance report
        run: |
          echo "# RISC-V Compliance Test Results" > compliance_report.md
          echo "" >> compliance_report.md
          echo "| ISA | Pass | Fail |" >> compliance_report.md
          echo "|-----|------|------|" >> compliance_report.md
          find . -name "compliance_results.txt" | while read f; do
            cat "$f" | while IFS=, read -r isa pass fail; do
              ISA_NAME="${isa#isa=}"
              PASS_N="${pass#pass=}"
              FAIL_N="${fail#fail=}"
              echo "| $ISA_NAME | $PASS_N | $FAIL_N |" >> compliance_report.md
            done
          done
          cat compliance_report.md

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: compliance_report.md
